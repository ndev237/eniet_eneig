{% load static %}
<!-- ================================================================ -->
<!-- BREADCRUMB - Fil d'Ariane du dashboard                            -->
<!-- Variable attendue : items (liste de dicts {label, url})           -->
<!-- Le dernier item est considéré comme la page courante (pas de lien)-->
<!-- ================================================================ -->
<nav class="flex items-center gap-2 text-sm text-ink/50 mb-4" aria-label="Fil d'Ariane">
    <a href="{% url 'dashboard:home' %}" class="hover:text-primary transition-colors flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
    </a>
    {% for item in items %}
        <span class="text-ink/30">/</span>
        {% if item.url and not forloop.last %}
            <a href="{{ item.url }}" class="hover:text-primary transition-colors">{{ item.label }}</a>
        {% else %}
            <span class="text-primary font-medium">{{ item.label }}</span>
        {% endif %}
    {% endfor %}
</nav>

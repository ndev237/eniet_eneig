<!-- ================================================================ -->
<!-- TOASTS - Notifications flottantes en haut à droite                -->
<!-- Remplace les bandeaux statiques pour une UX plus moderne          -->
<!-- ================================================================ -->
{% if messages %}
<div id="toast-container" class="fixed top-6 right-6 z-[100] space-y-3 w-full max-w-sm pointer-events-none">
    {% for message in messages %}
        <div class="toast pointer-events-auto flex items-start gap-3 p-4 shadow-lg border-l-4 bg-white
            {% if message.tags == 'success' %}border-green-600
            {% elif message.tags == 'error' %}border-red-600
            {% elif message.tags == 'warning' %}border-amber-500
            {% else %}border-blue-600
            {% endif %}"
            data-toast
            style="transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);">

            <!-- Icône -->
            <div class="flex-shrink-0
                {% if message.tags == 'success' %}text-green-600
                {% elif message.tags == 'error' %}text-red-600
                {% elif message.tags == 'warning' %}text-amber-500
                {% else %}text-blue-600
                {% endif %}">
                {% if message.tags == 'success' %}
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                {% elif message.tags == 'error' %}
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                {% else %}
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                {% endif %}
            </div>

            <p class="text-sm text-ink/80 flex-1 font-medium">{{ message }}</p>

            <button type="button" class="text-ink/30 hover:text-ink/60 flex-shrink-0" data-toast-close>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
    {% endfor %}
</div>
{% endif %}
